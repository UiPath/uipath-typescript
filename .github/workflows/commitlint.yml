name: Commitlint

on:
  pull_request:
    branches: [main, feat/*]
    types:
      - opened # a PR is opened
      - edited # a PR description is edited ( so authors can fix an empty description without re-pushing commits)
      - synchronize # new commits are pushed to PR branch
      - reopened # a previously closed PR is reopened

permissions:
  contents: read
  packages: read

jobs:
  pr-description:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description is not empty
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$(echo "$PR_BODY" | tr -d '[:space:]')" ]; then
            echo "❌ PR description is empty. Please provide relevant description for your pull request."
            exit 1
          fi
          echo "PR description is present."

  commitlint:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@uipath"

      - name: Install commitlint
        run: npm install @commitlint/cli @commitlint/config-conventional

      - name: Validate commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
