# Deploy a UiPath Coded App via the uip CLI.
#
# Trigger: push to main (auto-deploy), or manual dispatch.
# Prerequisites:
#   - UIPATH_CLIENT_ID and UIPATH_CLIENT_SECRET stored as repo secrets
#     (from an external app registered in UiPath with Apps + OR scopes)
#   - The external app assigned to the target Orchestrator folder
#   - Node.js project with a build step that outputs to ./dist

name: Deploy Coded App

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "App name to deploy"
        required: true
      path-name:
        description: "URL path name (https://<org>.uipath.host/<path-name>)"
        required: true
      environment:
        description: "Target environment (alpha/staging/cloud)"
        required: true
        default: "alpha"
        type: choice
        options:
          - alpha
          - staging
          - cloud

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install uip CLI
        run: npm install -g @uipath/uip

      - name: Login to UiPath
        run: |
          uip login \
            --authority "https://${{ inputs.environment }}.uipath.com" \
            --organization "$UIPATH_ORG" \
            --tenant "$UIPATH_TENANT" \
            --client-id "${{ secrets.UIPATH_CLIENT_ID }}" \
            --client-secret "${{ secrets.UIPATH_CLIENT_SECRET }}" \
            --scope "Apps OR.Administration OR.Execution"

      - name: Pack
        run: uip codedapp pack ./dist

      - name: Publish
        run: uip codedapp publish --name "${{ inputs.app-name }}"

      - name: Deploy
        run: |
          uip codedapp deploy \
            --name "${{ inputs.app-name }}" \
            --path-name "${{ inputs.path-name }}"
