name: "Test: Deploy Coded App (process-app-v1)"

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      app-name:
        description: "App name to deploy"
        required: true
        default: "process-app-v1-ci-test"
      path-name:
        description: "URL path name"
        required: true
        default: "process-app-v1-ci-test"
      org:
        description: "UiPath organization name"
        required: true
        default: "popoc"
      tenant:
        description: "UiPath tenant name"
        required: true
        default: "adetenant"
      folder-key:
        description: "Orchestrator folder key (UUID)"
        required: true

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples/process-app-v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install uip CLI
        run: npm install -g @uipath/uip
        working-directory: .

      - name: Install codedapp tool
        run: uip tools install codedapp

      - name: Login to UiPath
        run: |
          uip login \
            --organization "${{ inputs.org }}" \
            --tenant "${{ inputs.tenant }}" \
            --client-id "${{ secrets.UIPATH_CLIENT_ID }}" \
            --client-secret "${{ secrets.UIPATH_CLIENT_SECRET }}" \
            --scope "Apps OR.Folders.Read OR.Administration OR.Execution"

      - name: Pack
        run: uip codedapp pack ./dist --name "${{ inputs.app-name }}"

      - name: Publish
        run: uip codedapp publish --name "${{ inputs.app-name }}"

      - name: Deploy
        run: |
          uip codedapp deploy \
            --name "${{ inputs.app-name }}" \
            --path-name "${{ inputs.path-name }}" \
            --folder-key "${{ inputs.folder-key }}"
