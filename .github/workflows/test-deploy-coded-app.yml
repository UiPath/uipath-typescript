name: "Test: Deploy Coded App (process-app-v1)"

permissions:
  contents: read

on:
  push:
    branches: [test/ci-cd-workflow-validation]

env:
  NODE_VERSION: "20"
  APP_NAME: "process-app-v1-ci-test"
  PATH_NAME: "process-app-v1-ci-test"
  ORG: "popoc"
  TENANT: "adetenant"
  FOLDER_KEY: "8645d674-92d8-4281-9aef-43f3e3608ded"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples/process-app-v1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install uip CLI
        run: npm install -g @uipath/uip
        working-directory: .

      - name: Install codedapp tool
        run: uip tools install codedapp

      - name: Login to UiPath
        run: |
          uip login \
            --organization "${{ env.ORG }}" \
            --tenant "${{ env.TENANT }}" \
            --client-id "${{ secrets.UIPATH_CLIENT_ID }}" \
            --client-secret "${{ secrets.UIPATH_CLIENT_SECRET }}" \
            --scope "Apps OR.Folders.Read OR.Administration OR.Execution"

      - name: Pack
        run: uip codedapp pack ./dist --name "${{ env.APP_NAME }}"

      - name: Publish
        run: uip codedapp publish --name "${{ env.APP_NAME }}"

      - name: Deploy
        run: |
          uip codedapp deploy \
            --name "${{ env.APP_NAME }}" \
            --path-name "${{ env.PATH_NAME }}" \
            --folder-key "${{ env.FOLDER_KEY }}"
