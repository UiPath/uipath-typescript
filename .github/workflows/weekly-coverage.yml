name: Weekly Coverage (main)

# Runs the full coverage pipeline against main on a schedule. PR checks only run
# coverage against PR branches, so this keeps SonarCloud's main-branch analysis
# up to date.
on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:        # Allows manual trigger from GitHub UI

permissions:
  contents: read

# Serialize a manual dispatch against the scheduled run so two coverage passes
# don't hit the same dev tenant's integration data at once. Let an in-flight run
# finish rather than cancelling it.
concurrency:
  group: weekly-coverage
  cancel-in-progress: false

jobs:
  coverage:
    uses: ./.github/workflows/coverage.yml
    secrets: inherit
    with:
      ref_label: main
