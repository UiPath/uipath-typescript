name: PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened           # When PR is first created
      - synchronize      # When new commits are pushed to PR branch
      - reopened         # When a closed PR is reopened
  workflow_dispatch:     # Allows manual trigger from GitHub UI

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    # Shared coverage pipeline (unit + integration + SonarCloud). The same
    # workflow is reused by weekly-coverage.yml so the integration-test secret
    # mapping is defined only once.
    uses: ./.github/workflows/coverage.yml
    secrets: inherit
    with:
      ref_label: ${{ github.base_ref }}

  test-and-build:
    # Gate job that reports the flat `test-and-build` status check required by
    # the main ruleset. A job using `uses:` reports its check as
    # `test-and-build / coverage`, which the ruleset does not match — so this
    # thin job preserves the exact required context name. `if: always()` ensures
    # it runs (and reports) even when coverage fails, then fails itself if the
    # coverage workflow did not succeed.
    needs: coverage
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check coverage result
        if: needs.coverage.result != 'success'
        run: |
          echo "Coverage workflow concluded with: ${{ needs.coverage.result }}"
          exit 1

  test-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - telemetry
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  check-samples:
    # Sample-app convention gate. Runs the check-samples.mjs rules against the
    # sample apps changed in this PR (existing apps are a backlog; each becomes
    # enforced the next time it is changed). Not an oxlint rule — these are
    # filesystem/structural checks (file presence, README media, favicon) that a
    # source-code linter can't express, so they live as a script + this job.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Always run the rules' own self-test, so a rule-logic regression is
      # caught even on a PR that changes no sample apps.
      - name: Self-test the sample rules
        run: node scripts/check-samples.mjs --selftest

      - name: Check changed sample apps
        env:
          BASE_REF: ${{ github.base_ref }}
        run: node scripts/check-samples.mjs --changed "origin/$BASE_REF"

