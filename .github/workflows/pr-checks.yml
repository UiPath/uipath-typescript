name: PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    uses: ./.github/workflows/coverage.yml
    secrets: inherit
    with:
      ref_label: ${{ github.base_ref }}

  test-and-build:
    # Keeps the required flat status context while coverage runs in a reusable workflow.
    needs: [coverage, deterministic-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check coverage result
        if: needs.coverage.result != 'success'
        run: |
          echo "Coverage workflow concluded with: ${{ needs.coverage.result }}"
          exit 1

      - name: Check deterministic-lint result
        if: needs.deterministic-lint.result != 'success'
        run: |
          echo "deterministic-lint concluded with: ${{ needs.deterministic-lint.result }}"
          exit 1

  deterministic-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run PR convention checks
        run: node scripts/pr-checks/run-all.mjs

  test-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - telemetry
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
