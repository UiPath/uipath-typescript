name: PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened           # When PR is first created
      - synchronize      # When new commits are pushed to PR branch
      - reopened         # When a closed PR is reopened
  workflow_dispatch:     # Allows manual trigger from GitHub UI

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    # Shared coverage pipeline (unit + integration + SonarCloud). The same
    # workflow is reused by weekly-coverage.yml so the integration-test secret
    # mapping is defined only once.
    uses: ./.github/workflows/coverage.yml
    secrets: inherit
    with:
      ref_label: ${{ github.base_ref }}

  test-and-build:
    # Gate job that reports the flat `test-and-build` status check required by
    # the main ruleset. A job using `uses:` reports its check as
    # `test-and-build / coverage`, which the ruleset does not match — so this
    # thin job preserves the exact required context name. `if: always()` ensures
    # it runs (and reports) even when coverage fails, then fails itself if the
    # coverage workflow did not succeed.
    needs: [coverage, deterministic-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check coverage result
        if: needs.coverage.result != 'success'
        run: |
          echo "Coverage workflow concluded with: ${{ needs.coverage.result }}"
          exit 1

      - name: Check deterministic-lint result
        if: needs.deterministic-lint.result != 'success'
        run: |
          echo "deterministic-lint concluded with: ${{ needs.deterministic-lint.result }}"
          exit 1

  deterministic-lint:
    # Convention gates derived from recurring PR review feedback — samples
    # structure, ServiceModel/service JSDoc sync, oauth-scopes.md consistency,
    # and grep-level hygiene ratchets. See scripts/pr-checks/README.md.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run PR convention checks
        run: node scripts/pr-checks/run-all.mjs

  test-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - telemetry
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

