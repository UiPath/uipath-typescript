name: PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened           # When PR is first created
      - synchronize      # When new commits are pushed to PR branch
      - reopened         # When a closed PR is reopened
  workflow_dispatch:     # Allows manual trigger from GitHub UI

permissions:
  contents: read
  pull-requests: write

jobs:
  test-and-build:
    # Shared coverage pipeline (unit + integration + SonarCloud). The same
    # workflow is reused by weekly-coverage.yml so the integration-test secret
    # mapping is defined only once.
    uses: ./.github/workflows/coverage.yml
    secrets: inherit
    with:
      ref_label: ${{ github.base_ref }}

  test-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        package:
          - telemetry
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

